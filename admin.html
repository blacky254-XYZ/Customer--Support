<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Customer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .dashboard-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <!-- Navigation -->
    <nav class="bg-black border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center text-white font-bold">AD</div>
                <span class="font-semibold text-2xl">Admin Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="px-5 py-2 text-sm font-medium hover:bg-zinc-900 rounded-full transition-colors">Back to Support</a>
                <a href="https://wa.me/447853169761" target="_blank" class="px-5 py-2 text-sm font-semibold bg-green-600 hover:bg-green-500 rounded-full transition-colors flex items-center gap-2">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </a>
                <button onclick="logout()" class="px-5 py-2 text-sm font-medium bg-red-600 hover:bg-red-500 rounded-full transition-colors">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div id="loginSection" class="dashboard-bg py-20">
        <div class="max-w-md mx-auto px-6">
            <div class="bg-zinc-900 rounded-3xl p-12 border border-zinc-800">
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-3xl mx-auto mb-4">🔐</div>
                    <h1 class="text-3xl font-semibold">Admin Access</h1>
                    <p class="text-zinc-400 mt-2">Enter your password to continue</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <input type="password" id="adminPassword" placeholder="Enter Admin Password" 
                               class="w-full bg-zinc-950 border border-zinc-700 focus:border-red-500 focus:ring-1 focus:ring-red-500 rounded-2xl px-5 py-4 outline-none transition-all text-zinc-100" 
                               onkeypress="if(event.key === 'Enter') login()">
                    </div>
                    <button onclick="login()" 
                            class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-4 rounded-2xl text-lg transition-all">
                        <i class="fa-solid fa-lock-open mr-2"></i> Unlock Dashboard
                    </button>
                </div>
                
                <p class="text-center text-zinc-500 text-sm mt-6">
                    Unauthorized access is prohibited
                </p>
            </div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" style="display:none;" class="py-12">
        <div class="max-w-7xl mx-auto px-6">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold mb-2">Support Tickets</h1>
                <p class="text-zinc-400 text-lg">Manage all customer support requests</p>
            </div>

            <!-- Controls -->
            <div class="bg-zinc-900 rounded-2xl p-6 border border-zinc-800 mb-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="loadComplaints()" class="flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-medium transition-all">
                        <i class="fa-solid fa-sync"></i> Refresh
                    </button>
                    <div id="ticketCount" class="text-lg font-semibold text-zinc-300"></div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-zinc-400">Filter:</span>
                    <select id="statusFilter" onchange="loadComplaints()" class="bg-zinc-950 border border-zinc-700 rounded-xl px-4 py-2 text-zinc-100">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
            </div>

            <!-- Tickets List -->
            <div id="complaintsList" class="grid gap-6"></div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="admin.js"></script>
</body>
</html>
